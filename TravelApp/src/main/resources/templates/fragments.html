<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- This is a deprecated template. All pages now include their own header/footer. -->
<div th:fragment="chatbot">
    <div id="chatbot-widget" class="chatbot-widget" aria-live="polite">
        <button type="button" class="chatbot-launcher" aria-label="Open chatbot">Need help?</button>
        <div class="chatbot-panel" role="dialog" aria-modal="true" aria-label="Travel assistant chat">
            <div class="chatbot-header">
                <div>
                    <strong>TravelApp Assistant</strong>
                    <p>Ask about booking, packages, destinations, and support.</p>
                </div>
                <button type="button" class="chatbot-close" aria-label="Close chat">×</button>
            </div>
            <div class="chatbot-messages" aria-label="Chat messages"></div>
            <div class="chatbot-options-note">Choose one of the help options below.</div>
            <div class="chatbot-quick-links">
                <button type="button" class="chatbot-quick-link">How to book</button>
                <button type="button" class="chatbot-quick-link">View packages</button>
                <button type="button" class="chatbot-quick-link">Show travel places</button>
                <button type="button" class="chatbot-quick-link">See package prices</button>
                <button type="button" class="chatbot-quick-link">How to register</button>
                <button type="button" class="chatbot-quick-link">Contact us</button>
            </div>
        </div>
    </div>
    <script th:src="@{/js/chatbot.js}"></script>
</div>
</body>
</html>
