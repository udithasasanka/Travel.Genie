<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div th:fragment="chatbot">
    <!-- Premium Chat Trigger Button -->
    <button class="chatbot-trigger-btn" id="openChatBtn" onclick="toggleChat()">
        <i class="fas fa-robot"></i> ASK AI
    </button>

    <!-- Premium Chat Window -->
    <div class="chat-window" id="chat-box" style="display: none;">
        <div class="chat-header">
            <div class="chat-bot-identity">
                <i class="fas fa-robot"></i>
                <div>
                    <h4>Ceylon Genie</h4>
                    <span class="chat-status">AI Expedition Guide</span>
                </div>
            </div>
            <button class="chat-close-btn" onclick="toggleChat()">&times;</button>
        </div>
        
        <div class="chat-messages" id="chat-logs">
            <div class="message bot-msg">
                Greetings from Ceylon Reverie! I am your Premium Expedition Planner. How may I assist you today?
            </div>
        </div>
        
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Ask about destinations, duration, budget..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Luxury Theme Styles -->
    <style>
        .chatbot-trigger-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 999999;
            background: linear-gradient(135deg, #0e291b 0%, #06150e 100%);
            color: #f3f4f6; border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 14px 24px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.3s;
        }
        .chatbot-trigger-btn:hover { border-color: #d4af37; transform: translateY(-5px); }
        
        .chat-window {
            position: fixed; bottom: 95px; right: 30px; width: 380px; height: 500px;
            background: #0e1424; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; overflow: hidden; z-index: 999999;
        }
        .chat-header { background: #070a12; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-bot-identity { display: flex; align-items: center; gap: 12px; color: #d4af37; }
        .chat-close-btn { background: none; border: none; color: #9ca3af; font-size: 24px; cursor: pointer; }
        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; background: rgba(11,15,25,0.6); }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; margin-bottom: 10px; font-size: 13px; color: white; }
        .bot-msg { background: #141b2d; border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; }
        .user-msg { background: #d4af37; color: black; align-self: flex-end; margin-left: auto; font-weight: 500; }
        .chat-footer { padding: 15px; background: #070a12; display: flex; gap: 10px; }
        .chat-footer input { flex-grow: 1; background: #141b2d; border: 1px solid #333; padding: 10px; border-radius: 8px; color: white; outline: none; }
        .chat-footer button { background: #d4af37; border: none; padding: 0 15px; border-radius: 8px; color: #070a12; cursor: pointer; }
    </style>

    <!-- Chat Logic -->
    <script>
        function toggleChat() {
            const box = document.getElementById("chat-box");
            box.style.display = box.style.display === "none" ? "flex" : "none";
        }

        function sendChatMessage() {
            const input = document.getElementById("chat-input");
            const logs = document.getElementById("chat-logs");
            if (!input.value.trim()) return;

            logs.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            const userMsg = input.value;
            input.value = "";
            logs.scrollTop = logs.scrollHeight;

            fetch('https://travel-genie-wokv.onrender.com/api/chatbot/generate-itinerary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ destination: userMsg, durationDays: 4 })
            })
            .then(res => res.text())
            .then(data => {
                logs.innerHTML += `<div class="message bot-msg">${data}</div>`;
                logs.scrollTop = logs.scrollHeight;
            })
            .catch(() => logs.innerHTML += `<div class="message bot-msg">Error: Check server connection.</div>`);
        }
    </script>
</div>

</body>
</html>
