<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .admin-nav {
            background-color: #343a40;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 8px 12px;
            display: inline-block;
            border-radius: 4px;
        }
        .admin-nav a:hover {
            background-color: #495057;
        }
        .form-container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
        }
        .btn-cancel:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/logout}">Logout</a>
        </nav>
    </div>
</header>

<main class="container">
    <h1 th:if="${package == null}">Add New Package</h1>
    <h1 th:if="${package != null}">Edit Package</h1>

    <div class="admin-nav">
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/destinations}">Destinations</a>
        <a th:href="@{/admin/packages}">Packages</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/admin/reviews}">Reviews</a>
    </div>

    <div class="form-container">

        <form th:if="${package == null}" th:action="@{/admin/packages/add}" method="post">
            <div class="form-group">
                <label for="name">Package Name</label>
                <input type="text" id="name" name="name" required/>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" required/>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="destinationId">Destination</label>
                <select id="destinationId" name="destinationId" required>
                    <option value="">Select Destination</option>
                    <option th:each="dest : ${destinations}" th:value="${dest.id}" th:text="${dest.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">Price (USD)</label>
                <input type="number" id="price" name="price" step="0.01" required/>
            </div>
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" required/>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" name="imageUrl" required/>
            </div>
            <div class="form-group">
                <label for="maxTravelers">Max Travelers</label>
                <input type="number" id="maxTravelers" name="maxTravelers" required/>
            </div>
            <div class="form-group">
                <label for="mapUrl">Google Map Embed URL</label>
                <input type="text" id="mapUrl" name="mapUrl" placeholder="Paste Google Map src URL here"/>
            </div>
            <div class="form-group">
                <label for="includes">What's Included (Enter points separated by lines)</label>
                <textarea id="includes" name="includes" rows="4" placeholder="Luxury A/C Transportation&#10;Professional Tour Guide&#10;Entrance Tickets"></textarea>
            </div>

            <div style="background-color: #f8f9fa; padding: 20px; border-radius: 6px; border: 1px dashed #764ba2; margin-top: 25px; margin-bottom: 25px;">
                <h3 style="color: #764ba2; font-size: 16px; margin-top: 0; margin-bottom: 15px;">🏨 Add a Hotel Option for this Package (Optional)</h3>
                <div class="form-group">
                    <label>Hotel Name</label>
                    <input type="text" name="hotelName" placeholder="e.g. Grand Kandyan / Cinnamon Bey"/>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Hotel Extra Price</label>
                    <input type="number" step="0.01" name="hotelExtraPrice" placeholder="0.00" value="0.00"/>
                </div>
            </div>

            <button type="submit" class="btn-submit">Add Package</button>
            <a th:href="@{/admin/packages}" class="btn-cancel">Cancel</a>
        </form>

        <form th:if="${package != null}" th:action="@{/admin/packages/edit/{id}(id=${package.id})}" method="post">
            <div class="form-group">
                <label for="name">Package Name</label>
                <input type="text" id="name" name="name" th:value="${package.name}" required/>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" th:value="${package.category}" required/>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required th:text="${package.description}"></textarea>
            </div>
            <div class="form-group">
                <label for="destinationId">Destination</label>
                <select id="destinationId" name="destinationId" required>
                    <option th:each="dest : ${destinations}" th:value="${dest.id}" th:text="${dest.name}" th:selected="${dest.id == package.destination.id}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">Price (USD)</label>
                <input type="number" id="price" name="price" step="0.01" th:value="${package.price}" required/>
            </div>
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" th:value="${package.rating}" required/>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="text" id="imageUrl" name="imageUrl" th:value="${package.imageUrl}" required/>
            </div>
            <div class="form-group">
                <label for="maxTravelers">Max Travelers</label>
                <input type="number" id="maxTravelers" name="maxTravelers" th:value="${package.maxTravelers}" required/>
            </div>
            <div class="form-group">
                <label for="mapUrl">Google Map Embed URL</label>
                <input type="text" id="mapUrl" name="mapUrl" th:value="${package.mapUrl}" placeholder="Paste Google Map src URL here"/>
            </div>
            <div class="form-group">
                <label for="includes">What's Included (Enter points separated by lines)</label>
                <textarea id="includes" name="includes" rows="4" placeholder="What's Included" th:text="${package.includes}"></textarea>
            </div>

            <div style="background-color: #f8f9fa; padding: 20px; border-radius: 6px; border: 1px dashed #764ba2; margin-top: 25px; margin-bottom: 25px;">
                <h3 style="color: #764ba2; font-size: 16px; margin-top: 0; margin-bottom: 15px;">🏨 Add an Extra Hotel Option for this Package (Optional)</h3>
                <div class="form-group">
                    <label>Hotel Name</label>
                    <input type="text" name="hotelName" placeholder="e.g. Grand Kandyan / Cinnamon Bey"/>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Hotel Extra Price</label>
                    <input type="number" step="0.01" name="hotelExtraPrice" placeholder="0.00" value="0.00"/>
                </div>
            </div>

            <button type="submit" class="btn-submit">Update Package</button>
            <a th:href="@{/admin/packages}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp Admin Panel. All Rights Reserved.</p>
    </div>
</footer>
</body>
</html>
