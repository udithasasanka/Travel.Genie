<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .admin-nav {
            background-color: #343a40;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            padding: 8px 12px;
            display: inline-block;
            border-radius: 4px;
        }
        .admin-nav a:hover {
            background-color: #495057;
        }
        .form-container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .btn-cancel {
            background-color: #6c757d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
        }
        .btn-cancel:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/logout}">Logout</a>
        </nav>
    </div>
</header>

<main class="container">
    <h1 th:if="${user == null}">Add New User</h1>
    <h1 th:if="${user != null}">Edit User</h1>
    
    <div class="admin-nav">
        <a th:href="@{/admin}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/destinations}">Destinations</a>
        <a th:href="@{/admin/packages}">Packages</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/admin/reviews}">Reviews</a>
    </div>

    <div class="form-container">
        <form th:if="${user == null}" th:action="@{/admin/users/add}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required/>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required/>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone"/>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="USER">User</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Add User</button>
            <a th:href="@{/admin/users}" class="btn-cancel">Cancel</a>
        </form>

        <form th:if="${user != null}" th:action="@{/admin/users/edit/{id}(id=${user.id})}" method="post">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" th:value="${user.name}" required/>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:value="${user.email}" required/>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" th:value="${user.phone}"/>
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="USER" th:selected="${user.role == 'USER'}">User</option>
                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Update User</button>
            <a th:href="@{/admin/users}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp Admin Panel. All Rights Reserved.</p>
    </div>
</footer>
</body>
</html>
