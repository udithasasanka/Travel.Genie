<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/destinations}">Destinations</a>
            <a th:href="@{/packages}">Packages</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
            <a th:href="@{/admin}">Admin</a>
        </nav>
    </div>
</header>
<main class="container">
    <section class="page-heading">
        <h2>Booking Confirmation</h2>
    </section>
    <section class="card-grid">
        <div class="card">
            <div class="card-body">
                <h3>Booking Confirmed</h3>
                <p><strong>Package:</strong> <span th:text="${booking.tourPackage.name}"></span></p>
                <p><strong>Email:</strong> <span th:text="${booking.user.email}"></span></p>
                <p><strong>Travel Date:</strong> <span th:text="${booking.travelDate}"></span></p>
                <p><strong>Travelers:</strong> <span th:text="${booking.travelers}"></span></p>
                <p><strong>Total Price:</strong> <span th:text="${booking.totalPrice}"></span> USD</p>
            </div>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp. All Rights Reserved.</p>
    </div>
    <div th:replace="fragments :: chatbot"></div>
</footer>
</body>
</html>
