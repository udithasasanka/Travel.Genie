<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f766e;
            --primary-hover: #0d9488;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Background color eka ain kala video eka penna one nisa */
        }

        /* --- Background Video CSS --- */
        .bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Video eka tikak dark wenna one nam meka danna: */
            /* filter: brightness(0.6); */
        }

        main.container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative; /* Video eka pitipassen tiyaganna */
            z-index: 1;
        }

        /* Minimalist Light Login Card - With slight transparency */
        .auth-container {
            background: rgba(255, 255, 255, 0.92); /* 0.92 nisa poddak pitipasse video eka penawa */
            backdrop-filter: blur(8px); /* Lassanata blur effect ekak enawa */
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            box-sizing: border-box;
        }

        .auth-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(239, 246, 255, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
        }

        /* Theme Matching Emerald Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.15);
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.25);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Bottom Link Styling */
        .auth-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-link a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-link a:hover {
            color: #d97706;
            text-decoration: underline;
        }

        /* Notifications */
        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #86efac;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        small {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Header & Footer adjustments to look good over video */
        .site-header, .site-footer {
            position: relative;
            z-index: 1;
            /* Optional: podi background color ekak header/footer ekata danna puluwan */
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

<video autoplay muted loop class="bg-video">
    <source th:src="@{/videos/login.mp4}" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}">Register</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <h2>User Login</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label th:for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@gmail.com"/>
            </div>
            <div class="form-group">
                <label th:for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Your password"/>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="auth-link" style="margin-top: 25px; margin-bottom: 5px;">
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </div>

        <div class="auth-link" style="margin-bottom: 15px;">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>
    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp. All Rights Reserved.</p>
    </div>
    <div th:replace="fragments :: chatbot"></div>
</footer>
</body>
</html>
