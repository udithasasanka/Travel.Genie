<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f766e;
            --primary-hover: #0d9488;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* 🎨 වීඩියෝ එක වෙනුවට සේෆ් ලස්සන Gradient බැක්ග්‍රවුන්ඩ් එකක් දැම්මා ලෙඩේ නැති කරන්න */
            background: linear-gradient(135deg, #0f766e, #0d9488) !important;
        }

        main.container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            box-sizing: border-box;
        }

        .auth-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(239, 246, 255, 0.8);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.15);
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.25);
        }

        .auth-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-link a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            color: #d97706;
            text-decoration: underline;
        }

        .error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #86efac;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .site-header, .site-footer {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>

<header class="site-header">
    <div class="container header-inner" style="display: flex; justify-content: space-between; padding: 15px 20px; align-items: center;">
        <h1 style="margin:0;"><a th:href="@{/}" style="color: var(--primary-color); text-decoration:none;">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}" style="margin-right: 15px; text-decoration:none; color: var(--text-dark);">Home</a>
            <a th:href="@{/login}" style="margin-right: 15px; text-decoration:none; color: var(--text-dark); font-weight:bold;">Login</a>
            <a th:href="@{/register}" style="text-decoration:none; color: var(--text-dark);">Register</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <h2>User Login</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="your@gmail.com"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password"/>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="auth-link" style="margin-top: 25px; margin-bottom: 5px;">
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </div>

        <div class="auth-link" style="margin-bottom: 15px;">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>
    </div>
</main>

<footer class="site-footer" style="text-align: center; padding: 15px; background: #f8fafc;">
    <div class="container">
        <p style="margin:0;">© 2026 TravelApp. All Rights Reserved.</p>
    </div>
    </footer>
</body>
</html>
