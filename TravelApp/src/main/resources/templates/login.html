<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelApp - User Login</title>
    <!-- 🌐 Fonts සහ Icons කෙලින්ම ඉන්ටර්නෙට් එකෙන් ලෝඩ් කරමු -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* ⚠️ ඔයාගේ පරණ styles.css එකේ තියෙන හැමදේම බිඳ දමා වීඩියෝ එක මතුවීමට මෙම CSS Override එක උදව් වේ */
        html,
        body {
            background: #000000 !important;
            /* වීඩියෝ එක ලෝඩ් වෙනකම් කළු පසුබිමක් තබා ගනිමු */
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 🌐 Full Screen Video Styling */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -10000 !important;
            /* සියලුම දේට වඩා පසුපසින් තැබීමට */
            object-fit: cover;
            filter: brightness(0.65);
            /* වීඩියෝ එක තරමක් අඳුරු කර පෙන්වීමට */
        }

        /* Header Styling */
        .site-header {
            width: 100%;
            padding: 20px 40px;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-inner h1 m,
        .header-inner h1 a {
            color: #ffffff !important;
            text-decoration: none;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .header-inner nav a {
            color: #ffffff !important;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
        }

        .header-inner nav a:hover {
            color: #2dd4bf !important;
        }

        /* Main Container */
        main.container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* Glassmorphic White Login Card */
        .auth-container {
            background: rgba(255, 255, 255, 0.93) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .auth-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f766e;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* Inputs */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0f766e;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(239, 246, 255, 0.9) !important;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: #0f172a;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0f766e;
            background: #ffffff !important;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.15);
        }

        /* Premium Login Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #0f766e !important;
            color: white !important;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
        }

        .btn-login:hover {
            background-color: #0d9488 !important;
            transform: translateY(-1px);
        }

        /* Links Inside Card */
        .auth-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .auth-link a {
            color: #f59e0b !important;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .site-footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            position: relative;
            z-index: 100;
        }
    </style>
</head>

<body>

    <!-- 🌐 100%ක් වැඩ කරන, කෙලින්ම ඉන්ටර්නෙට් එකෙන් ලෝඩ් වෙන ලස්සන Travel Background වීඩියෝව -->
    <video autoplay muted loop playsinline
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;">
        <source src="/background.mp4" type="video/mp4">
    </video>

    <!-- Header Navigation -->
    <header class="site-header">
        <div class="container header-inner">
            <h1><a th:href="@{/}">TravelApp</a></h1>
            <nav>
                <a th:href="@{/}">Home</a>
                <a th:href="@{/login}">Login</a>
                <a th:href="@{/register}">Register</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Form -->
    <main class="container">
        <div class="auth-container">
            <h2>User Login</h2>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" required placeholder="Your password" />
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>

            <div class="auth-link" style="margin-top: 25px; margin-bottom: 5px;">
                <a th:href="@{/forgot-password}">Forgot password?</a>
            </div>
            <div class="auth-link" style="margin-bottom: 15px;">
                Don't have an account? <a th:href="@{/register}">Register here</a>
            </div>
            <div class="auth-link" style="background: rgba(241, 245, 249, 0.8); padding: 8px; border-radius: 8px;">
                <small style="color: #64748b;">Demo Admin: admin@example.com / admin123</small>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>© 2026 TravelApp. All Rights Reserved.</p>
        </div>
    </footer>

</body>

</html>
