<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelApp</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/destinations}">Destinations</a>
            <a th:href="@{/packages}">Packages</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
            <a th:href="@{/admin}">Admin</a>
        </nav>
    </div>
</header>
<main class="container">
    <section class="page-heading">
        <h2>Tour Packages</h2>
        <div class="filter-row">
            <a th:href="@{/packages}">All</a>
            <a th:href="@{/packages(category='Beach')}">Beach</a>
            <a th:href="@{/packages(category='Mountain')}">Mountain</a>
            <a th:href="@{/packages(category='Adventure')}">Adventure</a>
            <a th:href="@{/packages(category='Cultural')}">Cultural</a>
        </div>
    </section>
    <section class="card-grid">
        <div class="card" th:each="pkg : ${packages}">
            <img th:src="${pkg.imageUrl}" alt="Package image"/>
            <div class="card-body">
                <h4 th:text="${pkg.name}"></h4>
                <p th:text="${pkg.description}"></p>
                <p>Category: <strong th:text="${pkg.category}"></strong></p>
                <p>Price: <strong th:text="${pkg.price}"></strong> USD</p>
                <a th:href="@{/packages/{id}(id=${pkg.id})}" class="button">View Details</a>
            </div>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelApp. All Rights Reserved.</p>
    </div>
    <div th:replace="fragments :: chatbot"></div>
</footer>
</body>
</html>
